<style>
    :root {
  --youtube-red: rgb(200, 0, 0);
  --twitter-blue: rgb(6, 126, 224);
  --join-blue: rgb(3, 94, 221);
}
    .subscribe-button {
        background-color: var(--youtube-red);
        color :white;
        border: none;
        padding-top: 11px;
        padding-bottom: 11px;
        padding-left: 20px;
        padding-right: 20px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: all 0.15s;
        vertical-align: top;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }
    .subscribe-button:hover {
        opacity: 0.7;
    }
    .subscribe-button:active {
        button:active {
            transform: translateY(1px);
            box-shadow: none;
}
        opacity: 0.5;
    }
    .join-button {
        background-color: white;
        border-color: rgb(3, 94, 221);
        border-style: solid;
        border-width: 1px;
        padding-top: 11px;
        padding-bottom: 11px;
        padding-left: 20px;
        padding-right: 20px;
        color: rgb(3, 94, 221);
        padding: 10px 16px;
        border-radius: 2px;
        cursor: pointer;
        transition: all 0.15s;
        color : rgb(3, 94, 221);
        vertical-align: top;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);

    }
    .join-button:hover {
        color: white;
        background-color: rgb(3, 94, 221);
    }
    .join-button:active {
        opacity: 0.5;
        transform: translateY(1px);
        box-shadow: none;
    }

    .tweet-button {
        background-color: rgb(6, 126, 224);
        color: white;
        border: none;
        font-weight: bold;
        padding-top: 11px;
        padding-bottom: 11px;
        padding-left: 20px;
        padding-right: 20px;
        font-size: 15px;
        border-radius: 35px;
        cursor: pointer;
        margin-left: 8px;
        transition: all 0.15s;
        vertical-align: top;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }
    .tweet-button:hover{
    box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.2);
    }
    .tweet-button:active {
        opacity: 0.5;
        transform: translateY(1px);
        box-shadow: none;
    }
    /* Removed default border and added custom padding for a modern look */
</style>
<button class="subscribe-button">
    SUBSCRIBE
</button>
<button class="join-button">
    JOIN
</button>
<button class="tweet-button">
    Tweet
</button>
